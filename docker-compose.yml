services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://moviebot:moviebot@db:5432/moviebot
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: moviebot
      POSTGRES_USER: moviebot
      POSTGRES_PASSWORD: moviebot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moviebot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
